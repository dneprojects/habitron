[mypy]
python_version = 3.14
plugins =
follow_imports = silent
explicit_package_bases = True
namespace_packages = True

# Strict mode, but with a few targeted relaxations applied per-module
# below. The intent is to gate every new file on full strict typing
# while not blocking commits on a backlog of legacy edge cases.
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
show_error_codes = True

# habitron_client 1.0.0 ships ``py.typed``. The override below is a
# transitional muzzle: the integration still calls the lib through the
# old synchronous executor pattern and assigns to attributes the new
# API marks read-only. Phase 2 rewrites HbtnComm on the async API and
# this block goes away.
[mypy-habitron_client]
follow_imports = skip

[mypy-habitron_client.*]
follow_imports = skip

