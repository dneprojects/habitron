[mypy]
python_version = 3.14
plugins =
follow_imports = silent
explicit_package_bases = True
namespace_packages = True

# Strict mode, but with a few targeted relaxations applied per-module
# below. The intent is to gate every new file on full strict typing
# while not blocking commits on a backlog of legacy edge cases.
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
show_error_codes = True

# habitron_client has no type stubs.
[mypy-habitron_client]
ignore_missing_imports = True

[mypy-habitron_client.*]
ignore_missing_imports = True
