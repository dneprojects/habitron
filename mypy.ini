[mypy]
python_version = 3.14
plugins =
follow_imports = silent
explicit_package_bases = True
namespace_packages = True

# Strict mode, but with a few targeted relaxations applied per-module
# below. The intent is to gate every new file on full strict typing
# while not blocking commits on a backlog of legacy edge cases.
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
show_error_codes = True

# Home Assistant re-exports public API (e.g. camera.CameraWebRTCProvider,
# media_player.MediaPlayerState) without always listing them in __all__.
# Core's in-tree mypy resolves these fine; standalone here, strict mode's
# no_implicit_reexport would otherwise force a pile of type: ignore[attr-defined]
# that are unused once the integration ships in core. Allow implicit
# re-export so "clean here" matches "clean in core".
implicit_reexport = True

