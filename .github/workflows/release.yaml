name: Auto Release from Manifest

on:
  push:
    branches:
      - dev
    paths:
      - 'custom_components/habitron/manifest.json'

permissions:
  contents: write

jobs:
  # Gate the release on a fresh test run against the version that's about
  # to ship. This duplicates ``test.yml`` for manifest-touching commits but
  # gives us a hard guarantee that an automatic release never goes out on
  # a red main.
  test:
    name: Pre-release tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy --strict custom_components/habitron
      - run: python -m pytest --cov --cov-report=term

  release:
    name: Create Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # important for merge

      - name: Get version from manifest
        id: version
        run: |
          # Reads version from JSON file
          VERSION=$(jq -r '.version' custom_components/habitron/manifest.json)
          echo "Version found: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists. Skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge dev to main
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"

          # Wechsel zu main und merge dev
          git checkout main
          git merge origin/dev
          git push origin main

      # Extract notes from changelog.md
      - name: Extract Release Notes
        if: steps.check_tag.outputs.exists == 'false'
        id: extract_release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Look for header "## VERSION" or "## vVERSION"
          # and takes all until next header.
          awk "/^## v?$VERSION/{flag=1; next} /^## /{flag=0} flag" changelog.md > release_notes.md

          # Fallback use standard text
          if [ ! -s release_notes.md ]; then
            echo "Release v$VERSION" > release_notes.md
          fi

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
