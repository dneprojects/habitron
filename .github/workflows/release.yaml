name: Auto Release from Manifest

# Triggers AFTER the Tests workflow completes on dev. The release job
# checks whether the version currently in manifest.json is already
# tagged on GitHub and is a no-op when it is — so this workflow is
# self-healing: a release that gets stuck on a transient red CI run
# is automatically published by the next green ``Tests`` run without
# anyone having to bump the manifest just to retrigger.
#
# ``workflow_dispatch`` is kept so the workflow can also be fired
# manually from the Actions UI (e.g. after a tag was deleted by
# hand).
on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    # Only proceed when triggered manually OR when the upstream Tests
    # workflow concluded successfully.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # workflow_run defaults to the triggering workflow's commit;
          # be explicit so manual dispatches and rerun behaviour stay
          # predictable.
          ref: dev
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/habitron/manifest.json)
          echo "Version found: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists. Skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge dev to main
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          git checkout main
          git merge origin/dev
          git push origin main

      - name: Extract Release Notes
        if: steps.check_tag.outputs.exists == 'false'
        id: extract_release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Look for header "## VERSION" or "## vVERSION" and take all
          # lines until the next "## " header.
          awk "/^## v?$VERSION/{flag=1; next} /^## /{flag=0} flag" changelog.md > release_notes.md

          # Fallback if the version isn't in the changelog yet.
          if [ ! -s release_notes.md ]; then
            echo "Release v$VERSION" > release_notes.md
          fi

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
