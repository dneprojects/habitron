name: Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: ruff check
        run: python -m ruff check .

      - name: ruff format --check
        run: python -m ruff format --check .

      - name: mypy
        # Strictness comes from mypy.ini (strict = True). We do NOT pass
        # --strict on the CLI because it would override the deliberate
        # implicit_reexport relaxation (HA re-exports public API without
        # always listing it in __all__).
        run: python -m mypy custom_components/habitron

      - name: pytest --cov
        run: python -m pytest --cov --cov-report=term
