# Describes the format for Habitron services.
# All services operate against the single configured SmartHub. When more
# than one hub is configured, the first-loaded entry is targeted and a
# warning is logged.

hub_restart:
  name: Hub restart
  description: Soft-restart the SmartHub service

hub_reboot:
  name: Hub reboot
  description: Reboot the SmartHub host

mod_restart:
  name: Module restart
  description: Restart one or all Habitron modules
  fields:
    mod_nmbr:
      name: Module number
      description: Habitron's module address, default 0xFF for all modules
      example: 1
      selector:
        number:
          min: 1
          max: 64

rtr_restart:
  name: Router restart
  description: Restart the Habitron router

save_module_smc:
  name: Save module smc file
  description: Get module definitions of rules and names and save them to .smc text file
  fields:
    mod_nmbr:
      name: Module number
      description: Habitron's module address
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 64

save_module_smg:
  name: Save module smg file
  description: Get module settings and save them to .smg text file
  fields:
    mod_nmbr:
      name: Module number
      description: Habitron's module address
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 64

save_router_smr:
  name: Save router smr file
  description: Get router settings and save them to .smr text file

save_module_status:
  name: Save module status to file
  description: Get module status and save it to .mstat text file
  fields:
    mod_nmbr:
      name: Module number
      description: Habitron's module address
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 64

save_router_status:
  name: Save router status to file
  description: Get router status and save it to .rstat text file

update_entity:
  name: Forward update event to hub
  description: Internal hook used by automations to inject state-change events into a hub
  fields:
    hub_uid:
      name: Hub UID
      description: Host name or IP of the target SmartHub
      required: true
      selector:
        text:
    rtr_nmbr:
      name: Router number
      description: Router address (defaults to 1)
      example: 1
      selector:
        number:
          min: 1
          max: 8
    mod_nmbr:
      name: Module number
      description: Habitron module address
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 64
    evnt_type:
      name: Event type
      description: Habitron event type code
      required: true
      selector:
        number:
          min: 0
          max: 255
    evnt_arg1:
      name: Event arg 1
      required: true
      selector:
        number:
          min: 0
          max: 255
    evnt_arg2:
      name: Event arg 2
      required: true
      selector:
        number:
          min: 0
          max: 255
    evnt_arg3:
      name: Event arg 3
      selector:
        number:
          min: 0
          max: 255
    evnt_arg4:
      name: Event arg 4
      selector:
        number:
          min: 0
          max: 255
    evnt_arg5:
      name: Event arg 5
      selector:
        number:
          min: 0
          max: 255

sc_system_command:
  name: Smart Touch System Command
  description: Executes a restart or factory reset of a specific Smart Touch Controller App
  fields:
    target_device:
      name: Target Modules
      description: Select Habitron's modules
      required: true
      selector:
        device:
          integration: habitron
          entity:
            domain: assist_satellite
          multiple: true
    command:
      name: Command
      description: The system command to execute
      required: true
      default: "restart"
      selector:
        select:
          options:
            - label: "Soft Restart (Reconnect)"
              value: "restart"
            - label: "Factory Reset (Clear Data)"
              value: "factory_reset"
    new_ip:
      name: New Home Assistant IP / Route
      description: (Optional) Changes the stored IP/Route in the app BEFORE restarting
      required: false
      selector:
        text:
