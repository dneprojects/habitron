# Describes the format for Habitron services.
# All services operate against the single configured SmartHub. When more
# than one hub is configured, the first-loaded entry is targeted and a
# warning is logged.

hub_restart: {}
hub_reboot: {}
mod_restart:
  fields:
    mod_nmbr:
      example: 1
      selector:
        number:
          min: 1
          max: 64
rtr_restart: {}
save_module_smc:
  fields:
    mod_nmbr:
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 64
save_module_smg:
  fields:
    mod_nmbr:
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 64
save_router_smr: {}
save_module_status:
  fields:
    mod_nmbr:
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 64
save_router_status: {}
update_entity:
  fields:
    hub_uid:
      required: true
      selector:
        text: null
    rtr_nmbr:
      example: 1
      selector:
        number:
          min: 1
          max: 8
    mod_nmbr:
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 64
    evnt_type:
      required: true
      selector:
        number:
          min: 0
          max: 255
    evnt_arg1:
      required: true
      selector:
        number:
          min: 0
          max: 255
    evnt_arg2:
      required: true
      selector:
        number:
          min: 0
          max: 255
    evnt_arg3:
      selector:
        number:
          min: 0
          max: 255
    evnt_arg4:
      selector:
        number:
          min: 0
          max: 255
    evnt_arg5:
      selector:
        number:
          min: 0
          max: 255
sc_system_command:
  fields:
    target_device:
      required: true
      selector:
        device:
          integration: habitron
          entity:
            domain: assist_satellite
          multiple: true
    command:
      required: true
      default: restart
      selector:
        select:
          options:
          - label: Soft Restart (Reconnect)
            value: restart
          - label: Factory Reset (Clear Data)
            value: factory_reset
    new_ip:
      required: false
      selector:
        text: null
