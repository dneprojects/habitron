rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands:
    status: exempt
    comment: |
      Habitron is distributed as a HACS custom component, not part of the
      Home Assistant core repository. The home-assistant/brands repo
      contribution would happen on upstream migration.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: |
      The SmartHub is reached over the local network without per-user
      credentials. A WebSocket access token can be supplied but is
      optional; there is no upstream authentication state that can
      transition into a "needs re-authentication" failure.
  test-coverage:
    status: todo
    comment: |
      Current state: 633 tests, ~77% line coverage. Every entity
      platform, every config-flow path, the camera, the router, the
      ``SmartHub`` orchestrator, the descriptor helpers and the
      module-layer parser are at or above the Silver bar:
      ``binary_sensor`` 100%, ``button`` 100%, ``camera`` 100%,
      ``climate`` 100%, ``const`` 100%, ``interfaces`` 100%, ``notify``
      100%, ``number`` 100%, ``select`` 100%, ``sensor`` 100%,
      ``smart_hub`` 100%, ``switch`` 100%, ``text`` 100%, ``config_flow``
      99%, ``cover`` 99%, ``event`` 99%, ``device_trigger`` 98%,
      ``light`` 98%, ``router`` 98%, ``module`` 97%, ``diagnostics``
      96%, ``system_health`` 94%, ``coordinator`` 90%, ``services``
      90%, ``__init__`` 85%. The remaining gap is concentrated in the
      WebRTC / media / bus paths (``ws_provider.py`` 14%,
      ``media_player.py`` 16%, ``communicate.py`` 34%, ``update.py``
      35%, ``assist_satellite.py`` 39%), each of which needs a
      dedicated mocking layer to cover meaningfully. Hitting the 95%
      Silver target on these support files is a follow-up backlog item
      on the scale of the ``strict-typing`` migration.

  # Gold
  devices: done
  diagnostics: done
  discovery: done
  discovery-update-info: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: |
      Habitron modules are not auto-detected on the bus. New modules
      must first be configured in the SmartHub web UI; afterwards a
      reload of the integration picks them up. Run-time hot-plug is not
      part of the upstream device workflow.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices: done

  # Platinum
  async-dependency:
    status: exempt
    comment: |
      The upstream ``habitron_client`` library exposes a synchronous
      API. Every call from the integration is routed through
      ``HbtnComm._async_exec`` which offloads to
      ``hass.async_add_executor_job`` under a per-hub asyncio lock, so
      the event loop is never blocked. A full async rewrite would be an
      upstream project.
  inject-websession: done
  strict-typing:
    status: todo
    comment: |
      ``mypy.ini`` is in place with ``strict = True`` and the necessary
      ``ignore_missing_imports`` overrides for the upstream
      ``habitron_client``/``apkutils`` libraries that ship without
      stubs. Running ``mypy --strict custom_components/habitron`` is
      part of the migration backlog: ~420 errors remain, predominantly
      ``no-untyped-def`` on legacy bus-handling functions and a handful
      of ``attr-defined`` findings that point at real type confusion
      (``HbtnModule`` vs ``SmartController`` subclass attributes,
      ``bytes`` vs ``str`` mix-ups) which need code-level fixes rather
      than annotation changes.
