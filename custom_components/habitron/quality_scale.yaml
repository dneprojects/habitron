rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands:
    status: exempt
    comment: |
      Habitron is distributed as a HACS custom component, not part of the
      Home Assistant core repository. The home-assistant/brands repo
      contribution would happen on upstream migration.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: |
      The SmartHub is reached over the local network without per-user
      credentials. A WebSocket access token can be supplied but is
      optional; there is no upstream authentication state that can
      transition into a "needs re-authentication" failure.
  test-coverage:
    status: done
    comment: |
      994 tests, 100% line coverage. Every file in the integration is
      at 100%. The journey to get here surfaced a handful of true
      dead-code branches (defensive fallbacks guarded by ``None``
      checks for fields that ``__init__`` always seeds, a leftover
      ``Smart Controller`` exact-match header strip that no module
      type ever matches, an empty-list loop in SmartControllerMini)
      and one real bug in the router's ``get_comm_errors`` byte
      concatenation — all addressed in dedicated commits.

  # Gold
  devices: done
  diagnostics: done
  discovery: done
  discovery-update-info: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: |
      Habitron modules are not auto-detected on the bus. New modules
      must first be configured in the SmartHub web UI; afterwards a
      reload of the integration picks them up. Run-time hot-plug is not
      part of the upstream device workflow.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices: done

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing:
    status: done
    comment: |
      ``mypy --strict custom_components/habitron`` reports zero errors
      across all 34 source files (down from an initial 420). The only
      third-party runtime dependency is ``habitron_client`` 1.0.0,
      which ships ``py.typed`` and a fully async + strict-typed API
      (PEP 561 compliant). APK manifest parsing for firmware version
      detection lives in a small in-tree helper (``_axml.py``).
